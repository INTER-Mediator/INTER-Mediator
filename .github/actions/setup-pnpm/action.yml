name: setup-pnpm
description: Setup pnpm and Takumi Guard

runs:
  using: "composite"
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      with:
        version: 10.33.0

    - name: Setup Takumi Guard
      uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1

    - name: Copy the generated .npmrc file to enable Takumi Guard in directories that do not include a .npmrc file # https://github.com/flatt-security/setup-takumi-guard-npm/issues/2
      shell: bash
      run: cp .npmrc ~/.npmrc
